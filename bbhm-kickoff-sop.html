const STORAGE_KEY = "bbhm-kickoff-sop-v3";
const C = {
  navy:"#0D2B4E", navyMid:"#1A3A6E", navyLight:"#2563A8",
  navyPale:"#EAF0F8", navyBorder:"#C5D4E8", accentLt:"#4A90D9",
  white:"#FFFFFF", offWhite:"#F5F8FC",
  textDark:"#0D2B4E", textMid:"#4A6080", textLight:"#8AA0BC",
  success:"#1A7A4A", successBg:"#E8F5EE", danger:"#C0392B",
};

function RoleBadge({ role }) {
  const rc = ROLE_COLORS[role] || {};
  return (
    <span style={{ display:"inline-flex", alignItems:"center", background:rc.bg, color:rc.text,
      border:`1px solid ${rc.border}`, borderRadius:5, padding:"1px 7px", fontSize:10,
      fontWeight:700, letterSpacing:0.8, whiteSpace:"nowrap", flexShrink:0 }}>
      {role}
    </span>
  );
}

function App() {
  const [projectName, setProjectName] = React.useState("");
  const [projectNum,  setProjectNum]  = React.useState("");
  const [activeRole,  setActiveRole]  = React.useState("All");
  const [checked, setChecked] = React.useState(() => {
    const init = {};
    STEPS.forEach(s => s.items.forEach((_,i) => (init[`${s.id}-${i}`] = false)));
    return init;
  });
  const [expandedSteps, setExpandedSteps] = React.useState({ 1:true });
  const [savedAt,   setSavedAt]   = React.useState(null);
  const [celebrate, setCelebrate] = React.useState(null);
  const saveTimer = React.useRef(null);

  React.useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (d.checked)       setChecked(d.checked);
        if (d.projectName)   setProjectName(d.projectName);
        if (d.projectNum)    setProjectNum(d.projectNum);
        if (d.expandedSteps) setExpandedSteps(d.expandedSteps);
        if (d.savedAt)       setSavedAt(d.savedAt);
        if (d.activeRole)    setActiveRole(d.activeRole);
      }
    } catch(e) {}
  }, []);

  React.useEffect(() => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try {
        const now = new Date().toLocaleString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ checked, projectName, projectNum, expandedSteps, activeRole, savedAt: now }));
        setSavedAt(now);
      } catch(e) {}
    }, 800);
  }, [checked, projectName, projectNum, expandedSteps, activeRole]);

  const visibleItems = s => s.items.map((item,idx) => ({...item, idx})).filter(item => activeRole === "All" || item.role === activeRole);
  const stepProg = s => {
    const items = visibleItems(s);
    const done = items.filter(item => checked[`${s.id}-${item.idx}`]).length;
    return { done, total:items.length, pct:items.length ? Math.round((done/items.length)*100) : 0 };
  };
  const stepStatus = s => {
    const {done, total} = stepProg(s);
    if (total===0||done===0) return "pending";
    if (done===total) return "complete";
    return "active";
  };

  const allVisible  = STEPS.flatMap(s => visibleItems(s).map(item => `${s.id}-${item.idx}`));
  const totalItems  = allVisible.length;
  const doneItems   = allVisible.filter(k => checked[k]).length;
  const overallPct  = totalItems ? Math.round((doneItems/totalItems)*100) : 0;

  const toggleItem = (stepId, idx) => {
    const key = `${stepId}-${idx}`;
    const newVal = !checked[key];
    setChecked(p => ({...p, [key]:newVal}));
    const step = STEPS.find(s => s.id===stepId);
    const vis  = visibleItems(step);
    const willDone = vis.filter(item => (`${stepId}-${item.idx}`===key ? newVal : checked[`${stepId}-${item.idx}`])).length;
    if (willDone===vis.length && vis.length>0) {
      setCelebrate(stepId);
      setTimeout(()=>setCelebrate(null), 2200);
    }
  };

  const toggleExpand = id => setExpandedSteps(p => ({...p, [id]:!p[id]}));
  const resetAll = () => {
    if (!window.confirm("Reset all progress for this project?")) return;
    const fresh = {};
    STEPS.forEach(s => s.items.forEach((_,i) => (fresh[`${s.id}-${i}`]=false)));
    setChecked(fresh); setProjectName(""); setProjectNum(""); setExpandedSteps({1:true});
  };

  const stColor = st => st==="complete" ? C.success : st==="active" ? C.navyLight : C.navyBorder;

  const roleBtnStyle = r => {
    const isActive = activeRole===r;
    const rc = ROLE_COLORS[r];
    return {
      padding:"5px 16px", borderRadius:20, cursor:"pointer",
      fontFamily:"Georgia,serif", fontSize:12, fontWeight:700, letterSpacing:0.5,
      transition:"all 0.18s",
      border: isActive ? "1.5px solid transparent" : `1.5px solid ${r==="All" ? C.navyBorder : rc.border}`,
      background: isActive ? (r==="All" ? C.navy : rc.badge) : C.white,
      color: isActive ? C.white : (r==="All" ? C.textMid : rc.text),
      boxShadow: isActive ? "0 2px 8px rgba(0,0,0,0.15)" : "none",
    };
  };

  return (
    <div style={{ minHeight:"100vh", background:C.offWhite, fontFamily:"Georgia,serif", color:C.textDark }}>
      <header style={{ background:C.navy, position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 12px rgba(13,43,78,0.2)" }}>
        <div style={{ height:4, background:`linear-gradient(90deg,${C.navyLight},${C.accentLt})` }} />
        <div style={{ maxWidth:880, margin:"0 auto", display:"flex", alignItems:"center", gap:14, padding:"10px 20px" }}>
          <img src={`data:image/png;base64,${LOGO_B64}`} alt="BBHM"
            style={{ width:46, height:46, borderRadius:"50%", border:"2px solid rgba(255,255,255,0.2)", objectFit:"cover", background:C.white }} />
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:C.white }}>Building Better Homes Management</div>
            <div style={{ fontSize:10, letterSpacing:2.5, color:"rgba(255,255,255,0.5)", textTransform:"uppercase", marginTop:1 }}>Project Kickoff SOP</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, background:"rgba(255,255,255,0.08)", borderRadius:28, padding:"7px 16px", border:"1px solid rgba(255,255,255,0.12)" }}>
            <div style={{ position:"relative", width:34, height:34 }}>
              <svg width="34" height="34" style={{ transform:"rotate(-90deg)" }}>
                <circle cx="17" cy="17" r="13" fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="3"/>
                <circle cx="17" cy="17" r="13" fill="none" stroke={overallPct===100?"#4ADE80":C.accentLt} strokeWidth="3"
                  strokeDasharray={`${2*Math.PI*13}`} strokeDashoffset={`${2*Math.PI*13*(1-overallPct/100)}`}
                  strokeLinecap="round" style={{ transition:"stroke-dashoffset 0.5s ease" }}/>
              </svg>
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, fontWeight:700, color:overallPct===100?"#4ADE80":C.accentLt }}>{overallPct}%</div>
            </div>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:C.white }}>{doneItems}/{totalItems}</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,0.45)" }}>{activeRole==="All"?"all tasks":`${activeRole} tasks`}</div>
            </div>
          </div>
        </div>
        <div style={{ borderTop:"1px solid rgba(255,255,255,0.08)", background:"rgba(0,0,0,0.15)" }}>
          <div style={{ maxWidth:880, margin:"0 auto", padding:"10px 20px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:10, letterSpacing:2, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", marginRight:4 }}>View as:</span>
            {ROLES.map(r => (
              <button key={r} onClick={()=>setActiveRole(r)} style={roleBtnStyle(r)}>
                {r==="All"?"👥 All Roles":r==="PM"?"🏢 PM":r==="APM"?"🏗️ APM":"📋 Assistant"}
              </button>
            ))}
            {activeRole!=="All" && <span style={{ fontSize:10, color:"rgba(255,255,255,0.4)", marginLeft:4 }}>— showing <strong style={{ color:"rgba(255,255,255,0.7)" }}>{activeRole}</strong> tasks only</span>}
          </div>
        </div>
      </header>

      <main style={{ maxWidth:880, margin:"0 auto", padding:"22px 20px 80px" }}>
        <div style={{ background:C.white, border:`1px solid ${C.navyBorder}`, borderRadius:12, padding:"14px 20px", marginBottom:22, display:"flex", gap:16, alignItems:"center", flexWrap:"wrap", boxShadow:"0 1px 4px rgba(13,43,78,0.06)" }}>
          <div style={{ flex:1, minWidth:180 }}>
            <label style={{ fontSize:10, letterSpacing:2, color:C.textLight, textTransform:"uppercase", display:"block", marginBottom:3 }}>Project Name</label>
            <input value={projectName} onChange={e=>setProjectName(e.target.value)} placeholder="Enter project name..."
              style={{ background:"transparent", border:"none", outline:"none", color:C.textDark, fontSize:15, fontFamily:"Georgia,serif", width:"100%" }}/>
          </div>
          <div style={{ width:1, height:34, background:C.navyBorder }}/>
          <div style={{ minWidth:140 }}>
            <label style={{ fontSize:10, letterSpacing:2, color:C.textLight, textTransform:"uppercase", display:"block", marginBottom:3 }}>Project #</label>
            <input value={projectNum} onChange={e=>setProjectNum(e.target.value)} placeholder="e.g. #2025-041"
              style={{ background:"transparent", border:"none", outline:"none", color:C.textDark, fontSize:15, fontFamily:"Georgia,serif", width:"100%" }}/>
          </div>
          <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:12 }}>
            {savedAt && <span style={{ fontSize:10, color:C.textLight }}>✓ Saved {savedAt}</span>}
            <button onClick={resetAll} style={{ background:"transparent", border:"1px solid #FFCCCC", color:C.danger, borderRadius:6, padding:"5px 14px", fontSize:11, letterSpacing:1 }}>RESET</button>
          </div>
        </div>

        <div style={{ marginBottom:26 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
            <span style={{ fontSize:11, letterSpacing:2, color:C.textMid, textTransform:"uppercase" }}>{activeRole==="All"?"Overall Progress":`${activeRole} Progress`}</span>
            <span style={{ fontSize:11, fontWeight:700, color:overallPct===100?C.success:C.navyLight }}>{overallPct===100?"✓ COMPLETE":`${overallPct}% Complete`}</span>
          </div>
          <div style={{ height:7, background:C.navyBorder, borderRadius:4, overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:4, background:overallPct===100?C.success:`linear-gradient(90deg,${C.navyMid},${C.accentLt})`, width:`${overallPct}%`, transition:"width 0.5s ease" }}/>
          </div>
          <div style={{ display:"flex", gap:5, marginTop:9 }}>
            {STEPS.map(s => {
              const vis = visibleItems(s);
              const st  = vis.length===0?"hidden":stepStatus(s);
              return <div key={s.id} onClick={()=>vis.length>0&&toggleExpand(s.id)} title={`Step ${s.id}: ${s.title}`}
                style={{ flex:1, height:5, borderRadius:3, cursor:vis.length>0?"pointer":"default", opacity:vis.length===0?0.2:1,
                  background:st==="complete"?C.success:st==="active"?C.accentLt:C.navyBorder, transition:"background 0.3s" }}/>;
            })}
          </div>
        </div>

        {STEPS.map(step => {
          const vis = visibleItems(step);
          if (vis.length===0) return null;
          const {done, total, pct} = stepProg(step);
          const st    = stepStatus(step);
          const isOpen = !!expandedSteps[step.id];
          const isCel  = celebrate===step.id;
          return (
            <div key={step.id} style={{ marginBottom:10, background:C.white,
              border:`1.5px solid ${st==="complete"?"#A3D9B8":C.navyBorder}`, borderRadius:12,
              boxShadow:isCel?"0 0 0 3px rgba(26,122,74,0.2),0 4px 16px rgba(13,43,78,0.08)":"0 1px 4px rgba(13,43,78,0.05)",
              overflow:"hidden", transition:"box-shadow 0.3s,border-color 0.3s" }}>
              <div style={{ display:"flex" }}>
                <div style={{ width:5, background:stColor(st), flexShrink:0 }}/>
                <div style={{ flex:1 }}>
                  <div onClick={()=>toggleExpand(step.id)} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px", cursor:"pointer", userSelect:"none" }}>
                    <div style={{ width:34, height:34, borderRadius:8, flexShrink:0,
                      background:st==="complete"?C.successBg:st==="active"?"#EAF1FB":C.navyPale,
                      border:`2px solid ${stColor(st)}`, display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:12, fontWeight:700, color:stColor(st), transition:"all 0.3s" }}>
                      {st==="complete"?"✓":step.id}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                        <span style={{ fontSize:14 }}>{step.icon}</span>
                        <span style={{ fontSize:14, fontWeight:700, color:C.textDark }}>{step.title}</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:7, marginTop:3, flexWrap:"wrap" }}>
                        {activeRole==="All" && [...new Set(step.items.map(i=>i.role))].map(r=><RoleBadge key={r} role={r}/>)}
                        <span style={{ fontSize:10, color:C.textLight }}>{done}/{total} tasks</span>
                      </div>
                    </div>
                    <div style={{ width:54, flexShrink:0 }}>
                      <div style={{ height:4, background:C.navyBorder, borderRadius:2, overflow:"hidden" }}>
                        <div style={{ height:"100%", borderRadius:2, background:st==="complete"?C.success:C.navyLight, width:`${pct}%`, transition:"width 0.3s" }}/>
                      </div>
                      <div style={{ textAlign:"right", fontSize:9, color:C.textLight, marginTop:2 }}>{pct}%</div>
                    </div>
                    <div style={{ color:C.textLight, fontSize:11, transform:isOpen?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s" }}>▼</div>
                  </div>
                  {isOpen && (
                    <div style={{ borderTop:`1px solid ${C.navyBorder}`, padding:"10px 16px 14px" }}>
                      {vis.map(item => {
                        const key   = `${step.id}-${item.idx}`;
                        const isChk = checked[key];
                        const rc    = ROLE_COLORS[item.role] || {};
                        return (
                          <div key={item.idx} onClick={()=>toggleItem(step.id,item.idx)}
                            style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"7px 10px", borderRadius:8,
                              cursor:"pointer", background:isChk?C.successBg:"transparent", transition:"background 0.2s", marginBottom:2 }}>
                            <div style={{ width:19, height:19, borderRadius:5, flexShrink:0, marginTop:2,
                              border:`2px solid ${isChk?C.success:C.navyBorder}`, background:isChk?C.success:C.white,
                              display:"flex", alignItems:"center", justifyContent:"center",
                              fontSize:10, color:C.white, fontWeight:900, transition:"all 0.15s" }}>
                              {isChk&&"✓"}
                            </div>
                            <span style={{ flex:1, fontSize:13, lineHeight:1.5, color:isChk?"#5A8A6A":C.textDark,
                              textDecoration:isChk?"line-through":"none", transition:"color 0.2s" }}>{item.text}</span>
                            {activeRole==="All" && (
                              <span style={{ fontSize:10, fontWeight:700, letterSpacing:0.5, color:rc.text, background:rc.bg,
                                border:`1px solid ${rc.border}`, borderRadius:5, padding:"1px 8px",
                                whiteSpace:"nowrap", flexShrink:0, marginTop:2, opacity:isChk?0.5:1 }}>{item.role}</span>
                            )}
                          </div>
                        );
                      }}
                      {st==="complete" && (
                        <div style={{ marginTop:8, padding:"7px 14px", borderRadius:8, background:C.successBg,
                          border:"1px solid #A3D9B8", display:"flex", alignItems:"center", gap:8 }}>
                          <span>✅</span>
                          <span style={{ fontSize:11, color:C.success, fontWeight:700, letterSpacing:1 }}>STEP COMPLETE</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}

        {overallPct===100 && (
          <div style={{ marginTop:24, padding:"28px 32px", borderRadius:16,
            background:`linear-gradient(135deg,${C.navy},${C.navyMid})`,
            border:`1px solid ${C.navyLight}`, textAlign:"center",
            boxShadow:"0 8px 32px rgba(13,43,78,0.18)" }}>
            <div style={{ fontSize:40, marginBottom:10 }}>🚀</div>
            <div style={{ fontSize:20, fontWeight:700, color:C.white, letterSpacing:1, marginBottom:6 }}>
              {activeRole==="All"?"PROJECT MOBILIZED":`${activeRole} TASKS COMPLETE`}
            </div>
            <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)", letterSpacing:2, textTransform:"uppercase" }}>
              {projectName||"Project"} · All {totalItems} {activeRole==="All"?"":activeRole+" "}tasks done
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
